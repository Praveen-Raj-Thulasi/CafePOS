version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: odoo-cafe-backend-dev
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - pos-network
    dns_opt:
      - ndots:1
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: odoo-cafe-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: odoocafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
