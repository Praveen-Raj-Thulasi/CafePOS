version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: odoo-cafe-backend-prod
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    networks:
      - pos-network
    dns_opt:
      - ndots:1

networks:
  pos-network:
    driver: bridge
